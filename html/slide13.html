<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>XU HƯỚNG ĐỀ CẬP CỦA CÁC THƯƠNG HIỆU THEO THỜI GIAN</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fa;
        }
        .slide-container {
            position: relative;
            width: 1280px;
            height: 720px;
            background-color: #f5f7fa;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Background -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 0; top: 0; width: 1280px; height: 720px; background-color: #f5f7fa; z-index: 0;"></div>
<!-- Top Strip -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 0; top: 0; width: 1280px; height: 8px; background-image: url('https://page.gensparksite.com/template_extract/9ff990cd-818e-4539-ac15-16bd1a0cb4ed/slide_0/slide_image_2.png'); background-size: cover; z-index: 202;"></div>
<!-- Header Section -->
<!-- Kompa.ai Logo -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 60px; top: 40px; width: 200px; height: 30px; z-index: 203;">
<p style="margin: 0; font-family: 'Roboto', sans-serif; font-size: 24px; font-weight: 700; color: #0045c4;">Kompa.ai</p>
</div>
<!-- Date Range -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 991px; top: 45px; width: 229px; height: 20px; z-index: 204; text-align: right;">
<p style="margin: 0; font-family: 'Inter', sans-serif; font-size: 16px; color: #6b7280;">21/02/2026 → 28/02/2026</p>
</div>
<!-- Main Title -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 60px; top: 80px; width: 1160px; height: 44px; z-index: 205;">
<p style="margin: 0; font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 700; color: #111827;">XU HƯỚNG ĐỀ CẬP CỦA CÁC THƯƠNG HIỆU THEO THỜI GIAN</p>
</div>
<!-- Subtitle -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 60px; top: 130px; width: 1200px; height: 25px; z-index: 206;">
<p style="margin: 0; font-family: 'Inter', sans-serif; font-size: 18px; color: #4b5563;">Diễn biến thảo luận theo ngày và các sự kiện nổi bật tạo đỉnh thảo luận</p>
</div>
<!-- Chart Container (Left Side) -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 60px; top: 170px; width: 720px; height: 520px; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 200;"></div>

<!-- Chart -->
<div data-object="true" data-object-type="chart" style="position: absolute; left: 80px; top: 190px; width: 660px; height: 410px; z-index: 210;">
<canvas id="multiBrandTrendChart"></canvas>
</div>

<!-- Custom Legend (Horizontal at bottom) -->
<div id="chartLegend" data-object="true" data-object-type="textbox" style="position: absolute; left: 80px; top: 610px; width: 660px; height: 60px; z-index: 211;">
<div style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center;">
<!-- Legend will be dynamically generated -->
</div>
</div>

<!-- Right Side: Top 5 Topics with Representative Posts -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 800px; top: 170px; width: 420px; height: 520px; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 200;"></div>

<!-- Right Side Title -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 820px; top: 185px; width: 380px; height: 30px; z-index: 211;">
<p style="margin: 0; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; color: #111827;">Top 5 Topic - Bài đăng tiêu biểu</p>
</div>

<!-- Topic List Container -->
<div id="topicListContainer" data-object="true" data-object-type="textbox" style="position: absolute; left: 820px; top: 225px; width: 380px; height: 450px; z-index: 211; overflow-y: auto;">
<!-- Topics will be dynamically generated -->
</div>
<!-- Page Number -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 1247px; top: 690px; width: 13px; height: 15px; z-index: 236;">
<p style="margin: 0; font-family: 'Inter', sans-serif; font-size: 12px; color: #9ca3af; text-align: right;">13</p>
</div>
<!-- Bottom Strip -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 0; top: 712px; width: 1280px; height: 8px; background-image: url('https://page.gensparksite.com/template_extract/9ff990cd-818e-4539-ac15-16bd1a0cb4ed/slide_0/slide_image_35.png'); background-size: cover; z-index: 235;"></div>
<script>
        const ctxTrend = document.getElementById('multiBrandTrendChart').getContext('2d');
        
        new Chart(ctxTrend, {
            type: 'line',
            data: {
                labels: [],
                datasets: []
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                layout: {
                    padding: {
                        top: 40,
                        bottom: 10,
                        left: 10,
                        right: 10
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: '#f3f4f6',
                            borderDash: [5, 5]
                        },
                        ticks: {
                            font: { family: 'Inter', size: 11 },
                            color: '#6b7280'
                        },
                        afterDataLimits: function(axis) {
                            // Add 15% padding to max value to prevent label overlap
                            axis.max = axis.max * 1.15;
                        }
                    },
                    x: {
                        grid: { display: false },
                        ticks: {
                            font: { family: 'Inter', size: 12 },
                            color: '#374151'
                        }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#111827',
                        bodyColor: '#4b5563',
                        borderColor: '#e5e7eb',
                        borderWidth: 1,
                        padding: 10,
                        titleFont: { family: 'Inter', size: 13, weight: 'bold' },
                        bodyFont: { family: 'Inter', size: 12 },
                        displayColors: true,
                        boxWidth: 8,
                        boxHeight: 8,
                        usePointStyle: true,
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                if (context.parsed.y !== null) {
                                    label += context.parsed.y.toLocaleString() + ' lượt';
                                }
                                return label;
                            }
                        }
                    },
                    annotation: {
                        annotations: {
                        }
                    }
                }
            }
        });
    </script>
</div>
</body>
</html>
