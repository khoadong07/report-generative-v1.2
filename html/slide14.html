<!-- Stacked Chart -->
<div data-object="true" data-object-type="chart" style="position: absolute; left: 80px; top: 340px; width: 1000px; height: 320px; z-index: 210;">
<canvas id="channelStackedChart"></canvas>
</div>
<!-- Page Number -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 1247px; top: 690px; width: 13px; height: 15px; z-index: 236;">
<p style="margin: 0; font-family: 'Inter', sans-serif; font-size: 12px; color: #9ca3af; text-align: right;">14</p>
</div>
<!-- Bottom Strip -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 0; top: 712px; width: 1280px; height: 8px; background-image: url('https://page.gensparksite.com/template_extract/9ff990cd-818e-4539-ac15-16bd1a0cb4ed/slide_0/slide_image_35.png'); background-size: cover; z-index: 235;"></div>
<script>
            const ctxChannel = document.getElementById('channelStackedChart').getContext('2d');
            
            // Data will be dynamically generated
            const brands = [];
            const totals = [];
            
            // Datasets (Values)
            const dataFanpage = [];
            const dataFacebook = [];
            const dataTiktok = [];
            const dataYoutube = [];
            const dataNews = [];
            const dataOthers = [];

            // Calculate percentages for data labels logic
            const getPercent = (val, total) => ((val / total) * 100);

            new Chart(ctxChannel, {
                type: 'bar',
                data: {
                    labels: brands,
                    datasets: [
                        { label: 'Fanpage', data: dataFanpage, backgroundColor: '#1877F2', stack: 'Stack 0' },
                        { label: 'Facebook', data: dataFacebook, backgroundColor: '#42B72A', stack: 'Stack 0' },
                        { label: 'TikTok', data: dataTiktok, backgroundColor: '#010101', stack: 'Stack 0' },
                        { label: 'Youtube', data: dataYoutube, backgroundColor: '#FF0000', stack: 'Stack 0' },
                        { label: 'News', data: dataNews, backgroundColor: '#F4A261', stack: 'Stack 0' },
                        { label: 'Others', data: dataOthers, backgroundColor: '#ADB5BD', stack: 'Stack 0' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: {
                            top: 30
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { font: { family: 'Inter', size: 13, weight: 'bold' }, color: '#374151' }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f3f4f6', borderDash: [5, 5] },
                            ticks: { font: { family: 'Inter', size: 11 }, color: '#6b7280' }
                        }
                    },
                    plugins: {
                        legend: { display: false }, // Custom legend used
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.95)',
                            titleColor: '#111827',
                            bodyColor: '#4b5563',
                            borderColor: '#e5e7eb',
                            borderWidth: 1,
                            titleFont: { family: 'Inter', size: 13 },
                            bodyFont: { family: 'Inter', size: 12 },
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    let value = context.raw;
                                    let total = totals[context.dataIndex];
                                    let percentage = ((value / total) * 100).toFixed(1) + '%';
                                    return `${label}: ${value.toLocaleString()} (${percentage})`;
                                }
                            }
                        },
                        datalabels: {
                            color: '#fff',
                            font: { family: 'Inter', size: 11, weight: 'bold' },
                            formatter: (value, context) => {
                                const total = totals[context.dataIndex];
                                const percent = getPercent(value, total);
                                return percent > 5 ? percent.toFixed(1) + '%' : '';
                            },
                            anchor: 'center',
                            align: 'center'
                        }
                    },
                    animation: false
                },
                plugins: [ChartDataLabels, {
                    afterDatasetsDraw: function(chart) {
                        // Draw totals on top of stacked bars (moved from animation.onComplete)
                        const ctx = chart.ctx;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.font = 'bold 14px Inter';
                        ctx.fillStyle = '#111827';
                        
                        // Manually draw totals on top of bars
                        const meta = chart.getDatasetMeta(5); // Last dataset 'Others'
                        meta.data.forEach((bar, index) => {
                            const total = totals[index];
                            ctx.fillText(total.toLocaleString(), bar.x, bar.y - 5);
                        });
                    }
                }]
            });
        </script>
</div>
</body>
