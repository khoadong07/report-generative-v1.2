<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Top nguồn</title>
<link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet"/>
<style>
body { margin: 0; padding: 0; overflow: hidden; font-family: 'Product Sans', sans-serif; background-color: #f5f7fa; }
.slide-container { position: relative; width: 1280px; height: 720px; background-color: #f5f7fa; overflow: hidden; }
</style>
</head>
<body>
<div class="slide-container">
<!-- Background -->
<div style="position: absolute; left: 0; top: 0; width: 1280px; height: 720px; background-color: #f5f7fa; z-index: 0;"></div>
<!-- Top Strip -->
<div style="position: absolute; left: 0; top: 0; width: 1280px; height: 8px; background-image: url('https://page.gensparksite.com/template_extract/9ff990cd-818e-4539-ac15-16bd1a0cb4ed/slide_0/slide_image_2.png'); background-size: cover; z-index: 202;"></div>
<!-- Kompa.ai Logo -->
<div style="position: absolute; left: 60px; top: 40px; width: 200px; height: 30px; z-index: 203;">
<p style="margin: 0; font-family: 'Product Sans', sans-serif; font-size: 24px; font-weight: 700; color: #0045c4;">Kompa.ai</p>
</div>
<!-- Date Range -->
<div style="position: absolute; left: 991px; top: 45px; width: 229px; height: 20px; z-index: 204; text-align: right;">
<p style="margin: 0; font-family: 'Product Sans', sans-serif; font-size: 16px; color: #6b7280;">{{DATE_RANGE}}</p>
</div>
<!-- Main Title -->
<div style="position: absolute; left: 60px; top: 80px; width: 1160px; height: 44px; z-index: 205;">
<p style="margin: 0; font-family: 'Product Sans', sans-serif; font-size: 36px; font-weight: 700; color: #111827;">{{TITLE}}</p>
</div>
<!-- Table Container -->
<div style="position: absolute; left: 60px; top: 150px; width: 1160px; height: 500px; background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 200;"></div>
<!-- Table Header Background -->
<div style="position: absolute; left: 60px; top: 150px; width: 1160px; height: 50px; background-color: #0045c4; border-top-left-radius: 8px; border-top-right-radius: 8px; z-index: 201;"></div>
<!-- Table Headers -->
<div style="position: absolute; left: 80px; top: 165px; width: 60px; height: 20px; z-index: 202; text-align: center;">
<p style="margin: 0; font-family: 'Product Sans', sans-serif; font-size: 14px; font-weight: 700; color: #ffffff;">STT</p>
</div>
<div style="position: absolute; left: 180px; top: 165px; width: 700px; height: 20px; z-index: 203;">
<p style="margin: 0; font-family: 'Product Sans', sans-serif; font-size: 14px; font-weight: 700; color: #ffffff;">Nguồn</p>
</div>
<div style="position: absolute; left: 920px; top: 165px; width: 260px; height: 20px; z-index: 204; text-align: right;">
<p style="margin: 0; font-family: 'Product Sans', sans-serif; font-size: 14px; font-weight: 700; color: #ffffff;">Số lượng đề cập</p>
</div>
{{TABLE_ROWS}}
<!-- Page Number -->
<div style="position: absolute; left: 1247px; top: 690px; width: 13px; height: 15px; z-index: 236;">
<p style="margin: 0; font-family: 'Product Sans', sans-serif; font-size: 12px; color: #9ca3af; text-align: right;">4</p>
</div>
<!-- Bottom Strip -->
<div style="position: absolute; left: 0; top: 712px; width: 1280px; height: 8px; background-image: url('https://page.gensparksite.com/template_extract/9ff990cd-818e-4539-ac15-16bd1a0cb4ed/slide_0/slide_image_35.png'); background-size: cover; z-index: 235;"></div>
</div>
</body>
</html>
